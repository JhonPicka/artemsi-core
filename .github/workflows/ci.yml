name: CI

on:
  push:
    branches: [main]
  pull_request:

# Variables factices : suffisent au build/typecheck (aucune connexion réelle à Supabase au build).
env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Lint informatif tant que les apostrophes legacy ne sont pas échappées.
      - run: npm run lint || true
      - run: npm run build

  e2e-webkit:
    name: Test homepage (WebKit / Safari)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install webkit --with-deps
      - run: npm run build
      - run: npm run test:e2e
